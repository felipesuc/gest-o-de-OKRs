<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Objetivos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0D1B2A;
  --ink-soft:#43536A;
  --ink-faint:#8A96A8;
  --gold:#C9A84C;
  --gold-soft:#F5EDD8;
  --line:#E4E8EE;
  --line-soft:#F0F3F7;
  --bg:#FFFFFF;
  --bg-soft:#F8FAFC;
  --verde:#1B9E4B;
  --verde-bg:#E7F6EC;
  --amarelo:#D99000;
  --amarelo-bg:#FCF3DD;
  --vermelho:#D64545;
  --vermelho-bg:#FBE9E9;
  --azul:#2563EB;
  --azul-bg:#E8EFFD;
  --radius:10px;
  --shadow:0 1px 2px rgba(13,27,42,.06),0 4px 14px rgba(13,27,42,.07);
  --shadow-lg:0 8px 40px rgba(13,27,42,.18);
  font-size:15px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:.92rem;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold)}
textarea{resize:vertical;min-height:72px}
.mono{font-family:'IBM Plex Mono',monospace}

/* ---------- Topbar ---------- */
.topbar{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line)}
.topbar-inner{display:flex;align-items:center;gap:20px;padding:0 24px;height:58px}
.brand{display:flex;align-items:baseline;gap:9px;white-space:nowrap}
.brand-mark{width:11px;height:11px;background:var(--gold);border-radius:2px;transform:rotate(45deg);align-self:center}
.brand b{font-size:1.02rem;font-weight:700;letter-spacing:-.01em}
.brand span{font-size:.72rem;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
.telas-strip{display:flex;gap:2px;overflow-x:auto;flex:1;scrollbar-width:thin}
.tela-tab{padding:7px 14px;border-radius:8px 8px 0 0;font-size:.88rem;font-weight:500;color:var(--ink-soft);white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:8px}
.tela-tab:hover{background:var(--bg-soft)}
.tela-tab.active{color:var(--ink);font-weight:600;border-bottom-color:var(--gold)}
.tela-tab .x{opacity:0;font-size:.8rem;color:var(--ink-faint);padding:0 2px}
.tela-tab:hover .x{opacity:1}
.tela-tab .x:hover{color:var(--vermelho)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;font-size:.86rem;font-weight:600;transition:.12s;white-space:nowrap}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:#1c3050}
.btn-ghost{border:1px solid var(--line);color:var(--ink-soft);background:#fff}
.btn-ghost:hover{border-color:var(--ink-faint);color:var(--ink)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{filter:brightness(1.05)}
.btn-danger{background:var(--vermelho);color:#fff}
.btn-sm{padding:5px 10px;font-size:.8rem}

/* ---------- Sub header ---------- */
.subbar{display:flex;align-items:center;gap:14px;padding:14px 24px;flex-wrap:wrap}
.tela-title{font-size:1.35rem;font-weight:700;letter-spacing:-.02em}
.view-switch{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-left:auto}
.view-switch button{padding:7px 16px;font-size:.84rem;font-weight:600;color:var(--ink-soft);border-right:1px solid var(--line)}
.view-switch button:last-child{border-right:none}
.view-switch button.active{background:var(--ink);color:#fff}
.subbar .actions{display:flex;gap:8px;flex-wrap:wrap}

.sync-badge{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--ink-soft);border:1px solid var(--line);border-radius:12px;padding:3px 10px;white-space:nowrap}
.sync-badge i{width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}
.sync-badge.ok i{background:var(--verde)}
.sync-badge.saving i{background:var(--amarelo)}
.sync-badge.err i{background:var(--vermelho)}

/* ---------- Filtros ---------- */
.filterbar{display:flex;align-items:flex-end;gap:10px;padding:0 24px 14px;flex-wrap:wrap}
.filterbar .f-field{display:flex;flex-direction:column;gap:4px}
.filterbar .f-field>span{font-family:'IBM Plex Mono',monospace;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.filterbar input,.filterbar select{width:auto;min-width:130px;padding:6px 9px;font-size:.84rem}
.filterbar input[type=search]{min-width:200px}
.filter-count{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--ink-soft);background:var(--bg-soft);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
.filter-count b{color:var(--ink)}
.card-parent-ref{font-size:.68rem;color:var(--ink-faint);margin-bottom:4px;font-family:'IBM Plex Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:760px){.filterbar{padding:0 14px 14px}}

/* ---------- OKR panel ---------- */
.okr-panel{margin:0 24px 18px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.okr-head{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--bg-soft);border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
.okr-head .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;background:var(--ink);padding:3px 8px;border-radius:4px}
.okr-head h2{font-size:.95rem;font-weight:600;flex:1}
.okr-head .chev{color:var(--ink-faint);transition:.15s}
.okr-panel.collapsed .okr-body{display:none}
.okr-panel.collapsed .chev{transform:rotate(-90deg)}
.okr-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.okr-item{border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.okr-item-head{display:flex;align-items:flex-start;gap:10px}
.okr-obj{font-weight:600;font-size:.98rem;flex:1;line-height:1.35}
.okr-obj small{display:block;color:var(--ink-faint);font-weight:500;font-size:.75rem;font-family:'IBM Plex Mono',monospace;margin-bottom:2px;letter-spacing:.08em}
.kr-list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.kr-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--bg-soft);border-radius:8px;font-size:.87rem}
.kr-key{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--ink-faint);font-weight:600;min-width:36px}
.kr-text{flex:1}
.kr-prog{display:flex;align-items:center;gap:8px;min-width:150px}
.kr-bar{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.kr-bar i{display:block;height:100%;background:var(--gold);border-radius:3px}
.kr-pct{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--ink-soft);min-width:34px;text-align:right}
.empty-note{color:var(--ink-faint);font-size:.86rem;padding:6px 0}

/* ---------- Kanban ---------- */
.board-wrap{padding:0 24px 40px;overflow-x:auto}
.board{min-width:1080px}
.col-headers{display:grid;grid-template-columns:190px repeat(4,1fr);gap:12px;background:#fff;padding:8px 0 10px}
.col-h{font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:flex;align-items:center;gap:8px;padding:6px 10px;border-top:3px solid var(--line);background:var(--bg-soft);border-radius:0 0 6px 6px}
.col-h .count{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:0 8px;font-size:.7rem;color:var(--ink-faint)}
.col-h[data-c="fila"]{border-top-color:#B7C1CF}
.col-h[data-c="priorizado"]{border-top-color:var(--azul)}
.col-h[data-c="fazendo"]{border-top-color:var(--gold)}
.col-h[data-c="feito"]{border-top-color:var(--verde)}
.raia{display:grid;grid-template-columns:190px repeat(4,1fr);gap:12px;border-top:1px solid var(--line);padding:14px 0}
.raia-label{display:flex;flex-direction:column;gap:6px;padding:4px 6px;position:relative;z-index:12;background:#fff}
.raia-name{font-weight:700;font-size:.92rem;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.raia-name::before{content:"";width:4px;height:18px;background:var(--gold);border-radius:2px}
.raia-meta{font-size:.72rem;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace}
.raia-actions{display:flex;gap:4px;margin-top:2px}
.icon-btn{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;color:var(--ink-faint);font-size:.82rem;border:1px solid transparent}
.icon-btn:hover{background:var(--bg-soft);color:var(--ink);border-color:var(--line)}
.cell{background:var(--bg-soft);border:1px dashed transparent;border-radius:var(--radius);padding:8px;display:flex;flex-direction:column;gap:8px;min-height:70px;position:relative}
.cell.dragover{border-color:var(--gold);background:var(--gold-soft)}
.cell.scroll-limit{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--ink-faint) transparent}
.cell-hidden-count{position:sticky;bottom:0;margin-top:auto;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--ink-faint);background:linear-gradient(to bottom,transparent,var(--bg-soft) 45%);padding:10px 0 2px;pointer-events:none}

/* ---------- Raia recolhida ---------- */
.raia-toggle{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;color:var(--ink-faint);font-size:.78rem;flex-shrink:0;transition:transform .15s ease}
.raia-toggle:hover{background:var(--bg-soft);color:var(--ink)}
.raia.collapsed .raia-toggle{transform:rotate(-90deg)}
.raia.collapsed{padding:8px 0}
.cell-collapsed{background:var(--bg-soft);border-radius:var(--radius);padding:8px 12px;display:flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--ink-faint);cursor:pointer;min-height:0}
.cell-collapsed:hover{color:var(--ink);background:var(--gold-soft)}

/* ---------- Card ---------- */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow);cursor:grab;position:relative;transition:box-shadow .12s}
.card:hover{box-shadow:var(--shadow-lg)}
.card.dragging{opacity:.45}
.card-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.farol{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 3px transparent}
.farol.verde{background:var(--verde);box-shadow:0 0 0 3px var(--verde-bg)}
.farol.amarelo{background:var(--amarelo);box-shadow:0 0 0 3px var(--amarelo-bg)}
.farol.vermelho{background:var(--vermelho);box-shadow:0 0 0 3px var(--vermelho-bg)}
.card-id{font-family:'IBM Plex Mono',monospace;font-size:.66rem;color:var(--ink-faint);font-weight:600}
.chip{font-size:.66rem;font-weight:600;padding:2px 7px;border-radius:9px;letter-spacing:.02em}
.chip.pai{background:var(--ink);color:var(--gold)}
.chip.filho{background:var(--line-soft);color:var(--ink-soft);border:1px solid var(--line)}
.chip.status-no-prazo{background:var(--verde-bg);color:var(--verde)}
.chip.status-em-risco{background:var(--amarelo-bg);color:var(--amarelo)}
.chip.status-atrasado{background:var(--vermelho-bg);color:var(--vermelho)}
.chip.status-bloqueado{background:#EDE9FE;color:#7C3AED}
.chip.status-concluido{background:var(--azul-bg);color:var(--azul)}
.card-title{font-size:.9rem;font-weight:600;line-height:1.3;margin-bottom:4px}
.card-desc{font-size:.78rem;color:var(--ink-soft);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-dates{display:flex;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--ink-faint);flex-wrap:wrap}
.card-dates b{color:var(--ink-soft);font-weight:600}
.card-dates .late{color:var(--vermelho)}
.card-kids{margin-top:8px;border-top:1px dashed var(--line);padding-top:7px}
.kids-bar{display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--ink-soft);cursor:pointer}
.kids-bar .kr-bar{height:5px}
.kids-list{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.kid-row{display:flex;align-items:center;gap:6px;font-size:.75rem;padding:4px 7px;background:var(--bg-soft);border-radius:6px;cursor:pointer}
.kid-row:hover{background:var(--gold-soft)}
.kid-row .farol{width:7px;height:7px;box-shadow:none}
.kid-row .col-tag{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--ink-faint);text-transform:uppercase}
.card-add-kid{margin-top:6px;font-size:.72rem;color:var(--ink-faint);font-weight:600}
.card-add-kid:hover{color:var(--ink)}
.cell-add{border:1px dashed var(--line);border-radius:8px;padding:6px;font-size:.76rem;color:var(--ink-faint);text-align:center;font-weight:500}
.cell-add:hover{color:var(--ink);border-color:var(--ink-faint);background:#fff}

/* ---------- Tabela ---------- */
.table-wrap{padding:0 24px 40px;overflow-x:auto}
table.grid{width:100%;border-collapse:collapse;font-size:.86rem;min-width:1000px}
table.grid th{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);text-align:left;padding:10px 12px;border-bottom:2px solid var(--ink);cursor:pointer;user-select:none;white-space:nowrap}
table.grid th:hover{color:var(--ink)}
table.grid td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
table.grid tr.row:hover{background:var(--bg-soft);cursor:pointer}
table.grid tr.child-row td:first-child{padding-left:34px}
.td-title{font-weight:600}
.td-title small{display:block;color:var(--ink-faint);font-weight:400;font-size:.74rem}
.farol-cell{display:flex;align-items:center;gap:7px;font-size:.78rem;color:var(--ink-soft)}

/* ---------- Calendário ---------- */
.cal-wrap{padding:0 24px 40px}
.cal-nav{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.cal-nav h3{font-size:1.05rem;font-weight:700;min-width:190px;text-align:center;text-transform:capitalize}
.cal-legend{margin-left:auto;display:flex;gap:14px;font-size:.75rem;color:var(--ink-soft);align-items:center}
.cal-legend .farol{width:8px;height:8px;box-shadow:none}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.cal-dow{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);background:var(--bg-soft);padding:8px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:center}
.cal-day{min-height:108px;border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:6px;display:flex;flex-direction:column;gap:4px}
.cal-day .dnum{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--ink-faint);font-weight:600}
.cal-day.other{background:var(--bg-soft)}
.cal-day.today .dnum{background:var(--gold);color:var(--ink);border-radius:5px;padding:1px 6px;align-self:flex-start}
.cal-ev{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;padding:3px 6px;border-radius:5px;background:var(--bg-soft);border:1px solid var(--line);cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-ev:hover{background:var(--gold-soft)}
.cal-ev .farol{width:7px;height:7px;box-shadow:none;flex-shrink:0}
.cal-ev.done{text-decoration:line-through;color:var(--ink-faint)}
.cal-ev span{overflow:hidden;text-overflow:ellipsis}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(13,27,42,.45);display:flex;align-items:flex-start;justify-content:center;padding:6vh 16px;z-index:100;overflow-y:auto}
.modal{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:640px;overflow:hidden;animation:pop .14s ease-out}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;gap:10px;padding:16px 22px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:1.02rem;font-weight:700;flex:1}
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px;max-height:64vh;overflow-y:auto}
.modal-foot{display:flex;gap:10px;padding:14px 22px;border-top:1px solid var(--line);justify-content:flex-end;background:var(--bg-soft)}
.field label{display:block;font-size:.76rem;font-weight:600;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.02em}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.farol-picker{display:flex;gap:8px}
.farol-opt{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:.82rem;font-weight:600;color:var(--ink-soft)}
.farol-opt.sel{border-color:var(--ink);background:var(--bg-soft);color:var(--ink)}
.kr-edit-row{display:flex;gap:8px;align-items:center}
.kr-edit-row input{flex:1}
.hint{font-size:.74rem;color:var(--ink-faint)}
.modal-danger p{font-size:.92rem;line-height:1.5;color:var(--ink-soft)}
@media(max-width:760px){
  .row2,.row3{grid-template-columns:1fr}
  .topbar-inner{padding:0 14px}
  .subbar,.board-wrap,.table-wrap,.cal-wrap{padding-left:14px;padding-right:14px}
  .okr-panel{margin:0 14px 18px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="brand-mark"></span><b>Gestão&nbsp;de&nbsp;Objetivos</b></div>
    <nav class="telas-strip" id="telasStrip"></nav>
    <span id="syncBadge" class="sync-badge" style="display:none"></span>
    <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="sb.auth.signOut()">Sair</button>
    <button class="btn btn-ghost btn-sm" onclick="openTelaModal()">+ Nova tela</button>
  </div>
</header>

<div class="subbar">
  <h1 class="tela-title" id="telaTitle"></h1>
  <div class="actions">
    <button class="btn btn-primary btn-sm" onclick="openCardModal()">+ Card</button>
    <button class="btn bt-sm btn-ghost btn-sm" onclick="openOkrModal()">+ OKR</button>
    <button class="btn btn-ghost btn-sm" onclick="openRaiaModal()">+ Raia</button>
    <button class="btn btn-ghost btn-sm" onclick="exportJSON()">Exportar</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()">Importar</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
  <div class="view-switch" id="viewSwitch">
    <button data-v="kanban">Kanban</button>
    <button data-v="tabela">Tabela</button>
    <button data-v="calendario">Calendário</button>
  </div>
</div>

<div class="filterbar" id="filterBar"></div>

<section class="okr-panel" id="okrPanel">
  <div class="okr-head" onclick="toggleOkr()">
    <span class="eyebrow">OKR</span>
    <h2 id="okrHeadTitle">Objetivos e Resultados-chave</h2>
    <span class="chev">▾</span>
  </div>
  <div class="okr-body" id="okrBody"></div>
</section>

<main id="viewRoot"></main>

<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================= Persistência segura ================= */
const store = {
  get(){ try{ return JSON.parse(localStorage.getItem('okrflow_v1')) }catch(e){ return null } },
  set(s){ try{ localStorage.setItem('okrflow_v1', JSON.stringify(s)) }catch(e){} }
};
const uid = () => Math.random().toString(36).slice(2,9);
const COLS = [
  {id:'fila', nome:'Fila'},
  {id:'priorizado', nome:'Priorizado'},
  {id:'fazendo', nome:'Fazendo'},
  {id:'feito', nome:'Feito'}
];
const STATUS = ['No prazo','Em risco','Atrasado','Bloqueado','Concluído'];
const statusClass = s => 'status-' + s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-');

/* ================= Seed ================= */
function seed(){
  const t1 = uid(), r1 = uid(), r2 = uid(), o1 = uid(), k1 = uid(), k2 = uid();
  const p1 = uid(), p2 = uid();
  return {
    activeTela: t1,
    view: 'kanban',
    calRef: new Date().toISOString().slice(0,7),
    telas: [{
      id: t1, nome: 'Redesign 2026',
      okrs: [{
        id: o1,

/* ---- Limite de cards visíveis por célula (rolar para ver o resto) ---- */
const CELL_CARD_LIMIT = 10;
function applyCellLimits(){
  document.querySelectorAll('.cell[data-raia]').forEach(cell => {
    const cards = [...cell.children].filter(el => el.classList.contains('card'));
    if(cards.length > CELL_CARD_LIMIT){
      const cut = cards[CELL_CARD_LIMIT];
      cell.classList.add('scroll-limit');
      cell.style.maxHeight = Math.max(cut.offsetTop - 4, 140) + 'px';
      if(!cell.querySelector('.cell-hidden-count')){
        const tag = document.createElement('div');
        tag.className = 'cell-hidden-count';
        tag.textContent = `↓ +${cards.length - CELL_CARD_LIMIT} cards`;
        cell.appendChild(tag);
      }
    }
  });
}

/* ================= Helpers ================= */
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = d => { if(!d) return '—'; const [y,m,dd] = d.split('-'); return `${dd}/${m}/${y.slice(2)}`; };
const isLate = c => c.dataPlanejada && !c.dataRealizada && c.status !== 'Concluído' && c.dataPlanejada < new Date().toISOString().slice(0,10);
const children = pid => tela().cards.filter(c => c.parentId === pid);

/* ================= Filtros ================= */
let F = { q:'', tipo:'todos', farol:'', status:'', kr:'', raia:'' };
function cardType(c){ return children(c.id).length ? 'pai' : c.parentId ? 'filho' : 'simples'; }
function matchFilter(c){
  if(F.q){
    const q = F.q.toLowerCase();
    const pai = c.parentId ? (cardById(c.parentId)||{}).titulo||'' : '';
    if(!(c.titulo+' '+(c.descricao||'')+' '+pai).toLowerCase().includes(q)) return false;
  }
  if(F.tipo === 'pai' && cardType(c) !== 'pai') return false;
  if(F.tipo === 'filho' && cardType(c) !== 'filho') return false;
  if(F.tipo === 'paifilho' && cardType(c) === 'simples') return false;
  if(F.tipo === 'simples' && cardType(c) !== 'simples') return false;
  if(F.farol && c.farol !== F.farol) return false;
  if(F.status && c.status !== F.status) return false;
  if(F.kr && c.krId !== F.kr) return false;
  if(F.raia && c.raiaId !== F.raia) return false;
  return true;
}
function filteredCards(){ return tela().cards.filter(matchFilter); }
function setFilter(key, val){ F[key] = val; render(); }
function clearFilters(){ F = { q:'', tipo:'todos', farol:'', status:'', kr:'', raia:'' }; render(); }
function renderFilters(){

        <option value="pai" ${F.tipo==='pai'?'selected':''}>Somente pais</option>
        <option value="filho" ${F.tipo==='filho'?'selected':''}>Somente filhos</option>
        <option value="simples" ${F.tipo==='simples'?'selected':''}>Sem hierarquia</option>
      </select></div>
    <div class="f-field"><span>Farol</span>
      <select onchange="setFilter('farol',this.value)">
        <option value="">Todos</option>
        ${['verde','amarelo','vermelho'].map(f => `<option value="${f}" ${F.farol===f?'selected':''}>${f}</option>`).join('')}
      </select></div>
    <div class="f-field"><span>Status</span>
      <select onchange="setFilter('status',this.value)">
        <option value="">Todos</option>
        ${STATUS.map(s => `<option ${F.status===s?'selected':''}>${s}</option>`).join('')}
      </select></div>
    <div class="f-field"><span>Raia</span>
      <select onchange="setFilter('raia',this.value)">
        <option value="">Todas</option>
        ${t.raias.map(r => `<option value="${r.id}" ${F.raia===r.id?'selected':''}>${esc(r.nome)}</option>`).join('')}

    <div class="f-field"><span>KR</span>
      <select onchange="setFilter('kr',this.value)">
        <option value="">Todos</option>
        ${krOptions.map(k => `<option value="${k.id}" ${F.kr===k.id?'selected':''}>${k.label}</option>`).join('')}

    <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Limpar</button>
    <span class="filter-count"><b>${shown}</b>/${total} cards</span>`;
}

/* Drag & drop */
function bindDnD(){
  document.querySelectorAll('.card[draggable]').forEach(el => {
    el.addEventListener('dragstart', e => {
      e.stopPropagation();
      e.dataTransfer.setData('text/plain', el.dataset.id);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });
  document.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('dragover'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('dragover'));
    cell.addEventListener('drop', e => {
      e.preventDefault(); cell.classList.remove('dragover');
      const id = e.dataTransfer.getData('text/plain');
      const c = cardById(id);
      if(!c) return;
      c.coluna = cell.dataset.col;
      c.raiaId = cell.dataset.raia;
      if(c.coluna === 'feito' && !c.dataRealizada){ c.dataRealizada = new Date().toISOString().slice(0,10); c.status = 'Concluído'; }
      children(c.id).forEach(k => { k.raiaId = c.raiaId; });
      commit();
    });
  });
}

/* ================= Tabela ================= */
let sortKey = 'titulo', sortAsc = true;
function setSort(k){ if(sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = true; } render(); }
function renderTabela(){
  const t = tela();
  const raiaName = id => (t.raias.find(r => r.id === id) || {}).nome || '—';
  const colName = id => (COLS.find(c => c.id === id) || {}).nome || id;
  const parentTitle = id => id ? (cardById(id) || {}).titulo || '' : '';
  const farolOrder = {vermelho:0, amarelo:1, verde:2};
  let rows = filteredCards();
  rows.sort((a,b) => {
    let va, vb;
    switch(sortKey){
      case 'raia': va = raiaName(a.raiaId); vb = raiaName(b.raiaId); break;
      case 'coluna': va = COLS.findIndex(c=>c.id===a.coluna); vb = COLS.findIndex(c=>c.id===b.coluna); break;
      case 'farol': va = farolOrder[a.farol]; vb = farolOrder[b.farol]; break;
      default: va = a[sortKey] || ''; vb = b[sortKey] || '';
    }
    if(va < vb) return sortAsc ? -1 : 1;
    if(va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
  const arrow = k => sortKey === k ? (sortAsc ? ' ↑' : ' ↓') : '';
  return `<div class="table-wrap"><table class="grid">
    <thead><tr>
      <th onclick="setSort('titulo')">Entrega${arrow('titulo')}</th>
      <th onclick="setSort('raia')">Raia${arrow('raia')}</th>
      <th onclick="setSort('coluna')">Coluna${arrow('coluna')}</th>
      <th onclick="setSort('farol')">Farol${arrow('farol')}</th>
      <th onclick="setSort('status')">Status${arrow('status')}</th>
      <th onclick="setSort('dataPlanejada')">Planejada${arrow('dataPlanejada')}</th>
      <th onclick="setSort('dataRealizada')">Realizada${arrow('dataRealizada')}</th>
    </tr></thead>
    <tbody>
      ${rows.map(c => `<tr class="row ${c.parentId?'child-row':''}" onclick="openCardModal('${c.id}')">
        <td class="td-title">${c.parentId ? '↳ ' : ''}${esc(c.titulo)}
          ${c.parentId ? `<small>filho de: ${esc(parentTitle(c.parentId))}</small>` : children(c.id).length ? `<small>${children(c.id).length} card(s) filho(s)</small>` : ''}
        </td>
        <td>${esc(raiaName(c.raiaId))}</td>
        <td>${colName(c.coluna)}</td>
        <td><span class="farol-cell"><span class="farol ${c.farol}"></span>${c.farol}</span></td>
        <td><span class="chip ${statusClass(c.status)}">${esc(c.status)}</span></td>
        <td class="mono ${isLate(c)?'late':''}" style="${isLate(c)?'color:var(--vermelho);font-weight:600':''}">${fmtDate(c.dataPlanejada)}</td>
        <td class="mono">${fmtDate(c.dataRealizada)}</td>
      </tr>`).join('')}
    </tbody>
  </table>
  ${!rows.length ? '<div class="empty-note" style="padding:20px 4px">Nenhum card nesta tela ainda.</div>' : ''}
  </div>`;
}

/* ================= Calendário ================= */
function calMove(delta){
  let [y,m] = S.calRef.split('-').map(Number);
  m += delta;
  if(m < 1){ m = 12; y--; } if(m > 12){ m = 1; y++; }
  S.calRef = `${y}-${String(m).padStart(2,'0')}`;
  commit();
}
function renderCalendario(){
  const t = tela();
  const [y,m] = S.calRef.split('-').map(Number);
  const first = new Date(y, m-1, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);
  const monthName = first.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
  const dows = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const cells = [];
  const prevDays = new Date(y, m-1, 0).getDate();
  for(let i = startDow-1; i >= 0; i--) cells.push({d: prevDays-i, other:true});
  for(let d = 1; d <= daysInMonth; d++) cells.push({d, other:false, iso:`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`});
  while(cells.length % 7) cells.push({d: cells.length, other:true, pad:true});
  let padN = 1;
  cells.forEach(c => { if(c.pad) c.d = padN++; });
  const evs = iso => filteredCards().filter(c => c.dataPlanejada === iso);
  return `<div class="cal-wrap">
    <div class="cal-nav">
      <button class="btn btn-ghost btn-sm" onclick="calMove(-1)">←</button>
      <h3>${monthName}</h3>
      <button class="btn btn-ghost btn-sm" onclick="calMove(1)">→</button>
      <div class="cal-legend">
        <span><span class="farol verde"></span> ok</span>
        <span><span class="farol amarelo"></span> atenção</span>
        <span><span class="farol vermelho"></span> crítico</span>
        <span>riscado = realizado</span>
      </div>
    </div>
    <div class="cal-grid">
      ${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(c => `
        <div class="cal-day ${c.other?'other':''} ${c.iso===todayStr?'today':''}">
          <span class="dnum">${c.d}</span>
          ${c.iso ? evs(c.iso).map(ev => `
            <div class="cal-ev ${ev.dataRealizada?'done':''}" onclick="openCardModal('${ev.id}')" title="${esc(ev.titulo)}">
              <span class="farol ${ev.farol}"></span><span>${esc(ev.titulo)}</span>
            </div>`).join('') : ''}
        </div>`).join('')}
    </div>
  </div>`;
}

function openCardModal(id, preset){
  const t = tela();
  editingCardId = id || null;
  const c = id ? cardById(id) : Object.assign({
    titulo:'', descricao:'', raiaId:(t.raias[0]||{}).id||'', coluna:'fila',
    farol:'verde', status:'No prazo', dataPlanejada:'', dataRealizada:'', parentId:null, krId:null
  }, preset || {});
  if(!t.raias.length){ alertModal('Crie uma raia antes de adicionar cards.'); return; }
  const parents = t.cards.filter(x => !x.parentId && x.id !== id);
  const krOptions = t.okrs.flatMap((o,i) => o.krs.map((k,j) => ({id:k.id, label:`O${i+1}·KR${j+1} — ${k.texto}`})));
  modalShell(id ? 'Editar card' : 'Novo card', `
    <div class="field"><label>Título da entrega</label><input id="f_titulo" value="${esc(c.titulo)}" placeholder="Ex.: Integração com WhatsApp"></div>
    <div class="field"><label>Descrição da entrega</label><textarea id="f_desc" placeholder="O que será entregue e qual o critério de pronto?">${esc(c.descricao)}</textarea></div>
    <div class="row3">
      <div class="field"><label>Raia</label><select id="f_raia">${t.raias.map(r => `<option value="${r.id}" ${r.id===c.raiaId?'selected':''}>${esc(r.nome)}</option>`).join('')}</select></div>
      <div class="field"><label>Coluna</label><select id="f_col">${COLS.map(cl => `<option value="${cl.id}" ${cl.id===c.coluna?'selected':''}>${cl.nome}</option>`).join('')}</select></div>
      <div class="field"><label>Status</label><select id="f_status">${STATUS.map(s => `<option ${s===c.status?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Farol de risco</label>
      <div class="farol-picker" id="f_farol">
        ${['verde','amarelo','vermelho'].map(f => `<button type="button" class="farol-opt ${c.farol===f?'sel':''}" data-f="${f}"><span class="farol ${f}"></span>${f}</button>`).join('')}
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Data planejada</label><input type="date" id="f_plan" value="${c.dataPlanejada||''}"></div>
      <div class="field"><label>Data realizada</label><input type="date" id="f_real" value="${c.dataRealizada||''}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Card pai</label>
        <select id="f_pai">
          <option value="">— nenhum (este é um card raiz) —</option>
          ${parents.map(p => `<option value="${p.id}" ${p.id===c.parentId?'selected':''}>${esc(p.titulo)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Vinculado ao KR</label>
        <select id="f_kr">
          <option value="">— nenhum —</option>
          ${krOptions.map(k => `<option value="${k.id}" ${k.id===c.krId?'selected':''}>${esc(k.label)}</option>`).join('')}
        </select>
      </div>
    </div>
    ${id ? `<div class="hint">#${id.slice(0,4).toUpperCase()} · ${children(id).length} card(s) filho(s)</div>` : ''}
  `, `
    ${id ? `<button class="btn btn-ghost" style="margin-right:auto;color:var(--vermelho)" onclick="askDeleteCard('${id}')">Excluir card</button>` : ''}
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveCard()">Salvar card</button>
  `);
  document.querySelectorAll('#f_farol .farol-opt').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#f_farol .farol-opt').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
    });
  });
}
function saveCard(){
  const t = tela();
  const titulo = document.getElementById('f_titulo').value.trim();
  if(!titulo){ document.getElementById('f_titulo').focus(); return; }
  const data = {
    titulo,
    descricao: document.getElementById('f_desc').value.trim(),
    raiaId: document.getElementById('f_raia').value,
    coluna: document.getElementById('f_col').value,
    status: document.getElementById('f_status').value,
    farol: (document.querySelector('#f_farol .farol-opt.sel')||{dataset:{f:'verde'}}).dataset.f,
    dataPlanejada: document.getElementById('f_plan').value,
    dataRealizada: document.getElementById('f_real').value,
    parentId: document.getElementById('f_pai').value || null,
    krId: document.getElementById('f_kr').value || null
  };
  if(data.parentId === editingCardId) data.parentId = null;
  if(editingCardId){
    Object.assign(cardById(editingCardId), data);
  } else {
    t.cards.push(Object.assign({id: uid()}, data));
  }
  closeModal(); commit();
}
function askDeleteCard(id){
  const kids = children(id).length;
  confirmDanger(`Excluir este card${kids ? ` e seus ${kids} card(s) filho(s)` : ''}? Esta ação não pode ser desfeita.`, () => {
    const t = tela();
    t.cards = t.cards.filter(c => c.id !== id && c.parentId !== id);
    closeModal(); commit();
  });
}

/* --- OKR modal --- */
let editingOkrId = null;
function openOkrModal(id){
  const t = tela();
  editingOkrId = id || null;
  const o = id ? t.okrs.find(x => x.id === id) : {objetivo:'', krs:[{id:uid(), texto:''}]};
  modalShell(id ? 'Editar OKR' : 'Novo OKR', `
    <div class="field"><label>Objetivo</label><textarea id="o_obj" placeholder="Ex.: Reduzir o lead time da desocupação em 30% até dez/2026">${esc(o.objetivo)}</textarea></div>
    <div class="field"><label>Resultados-chave</label>
      <div id="o_krs" style="display:flex;flex-direction:column;gap:8px">
        ${o.krs.map(k => krRowHTML(k)).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="addKrRow()">+ KR</button>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveOkr()">Salvar OKR</button>
  `);
}
function krRowHTML(k){
  return `<div class="kr-edit-row" data-krid="${k.id}">
    <input value="${esc(k.texto)}" placeholder="Resultado mensurável…">
    <button class="icon-btn" onclick="this.parentElement.remove()">🗑</button>
  </div>`;
}
function addKrRow(){
  document.getElementById('o_krs').insertAdjacentHTML('beforeend', krRowHTML({id: uid(), texto:''}));
}
function saveOkr(){
  const t = tela();
  const objetivo = document.getElementById('o_obj').value.trim();
  if(!objetivo){ document.getElementById('o_obj').focus(); return; }
  const krs = [...document.querySelectorAll('#o_krs .kr-edit-row')]
    .map(r => ({id: r.dataset.krid, texto: r.querySelector('input').value.trim()}))
    .filter(k => k.texto);
  if(editingOkrId){
    const o = t.okrs.find(x => x.id === editingOkrId);
    o.objetivo = objetivo; o.krs = krs;
  } else {
    t.okrs.push({id: uid(), objetivo, krs});
  }
  closeModal(); commit();
}
function askDeleteOkr(id){
  confirmDanger('Excluir este OKR? Os cards vinculados aos KRs perderão o vínculo.', () => {
    const t = tela();
    const o = t.okrs.find(x => x.id === id);
    const krIds = new Set(o.krs.map(k => k.id));
    t.cards.forEach(c => { if(krIds.has(c.krId)) c.krId = null; });
    t.okrs = t.okrs.filter(x => x.id !== id);
    commit();
  });
}

/* --- Raia modal --- */
function openRaiaModal(id){
  const t = tela();
  const r = id ? t.raias.find(x => x.id === id) : null;
  modalShell(id ? 'Renomear raia' : 'Nova raia', `
    <div class="field"><label>Nome da raia</label><input id="r_nome" value="${r ? esc(r.nome) : ''}" placeholder="Ex.: SJ Imóveis, Time Comercial, Iniciativa X…"></div>
    <div class="hint">Raias funcionam como faixas horizontais do quadro (estilo Kanbanize): cada raia atravessa todas as colunas.</div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveRaia('${id||''}')">Salvar</button>
  `);
  setTimeout(() => document.getElementById('r_nome').focus(), 40);
}
function saveRaia(id){
  const t = tela();
  const nome = document.getElementById('r_nome').value.trim();
  if(!nome){ document.getElementById('r_nome').focus(); return; }
  if(id){ t.raias.find(x => x.id === id).nome = nome; }
  else t.raias.push({id: uid(), nome});
  closeModal(); commit();
}
function askDeleteRaia(id){
  const t = tela();
  const n = t.cards.filter(c => c.raiaId === id).length;
  confirmDanger(`Excluir esta raia${n ? ` e os ${n} card(s) dela` : ''}?`, () => {
    t.cards = t.cards.filter(c => c.raiaId !== id);
    t.raias = t.raias.filter(r => r.id !== id);
    commit();
  });
}

/* --- Tela modal --- */
function openTelaModal(){
  modalShell('Nova tela', `
    <div class="field"><label>Nome da tela</label><input id="t_nome" placeholder="Ex.: SJ Imóveis 2026, N2IA, Guarda Koisas…"></div>
    <div class="hint">Cada tela é um quadro completo e independente: OKRs próprios, raias próprias e cards próprios.</div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveTela()">Criar tela</button>
  `);
  setTimeout(() => document.getElementById('t_nome').focus(), 40);
}
function saveTela(){
  const nome = document.getElementById('t_nome').value.trim();
  if(!nome){ document.getElementById('t_nome').focus(); return; }
  const t = {id: uid(), nome, okrs:[], raias:[{id: uid(), nome:'Geral'}], cards:[]};
  S.telas.push(t);
  S.activeTela = t.id;
  closeModal(); commit();
}
function askDeleteTela(id){
  if(S.telas.length === 1){ alertModal('Não é possível excluir a única tela existente.'); return; }
  const t = S.telas.find(x => x.id === id);
  confirmDanger(`Excluir a tela "${esc(t.nome)}" com todos os seus OKRs, raias e cards?`, () => {
    S.telas = S.telas.filter(x => x.id !== id);
    if(S.activeTela === id) S.activeTela = S.telas[0].id;
    commit();
  });
}

/* --- Confirm / alert (compatível com iframe sandboxed) --- */
function confirmDanger(msg, onOk){
  window.__pendingConfirm = onOk;
  modalShell('Confirmar exclusão', `<div class="modal-danger"><p>${msg}</p></div>`, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-danger" onclick="(window.__pendingConfirm||function(){})();window.__pendingConfirm=null;">Excluir</button>
  `);
}
function alertModal(msg){
  modalShell('Aviso', `<div class="modal-danger"><p>${msg}</p></div>`, `
    <button class="btn btn-primary" onclick="closeModal()">Entendi</button>
  `);
}

/* ================= Import / Export ================= */
function exportJSON(){
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'okrflow_backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importJSON(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(!data.telas || !Array.isArray(data.telas)) throw new Error('formato inválido');
      S = data;
      if(!S.telas.find(t => t.id === S.activeTela)) S.activeTela = S.telas[0].id;
      commit();
    }catch(e){ alertModal('Arquivo inválido. Selecione um backup exportado por esta aplicação.'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

document.querySelectorAll('#viewSwitch button').forEach(b => {
  b.addEventListener('click', () => { S.view = b.dataset.v; commit(); });
});

/* ================= Nuvem (Supabase) ================= */
/* 1) Cole abaixo a URL e a anon key do seu projeto (Settings → API).
   2) Rode o SQL fornecido para criar a tabela okr_state com RLS.
   Se deixar os placeholders, o app funciona 100% local (localStorage). */
const SUPABASE_URL = 'https://qqanbwtgvdqjtljmnskc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_E86DT2r1Qgel6OAd5luXyQ_Ly6CWIJB';

const cloudEnabled = /^https:\/\//.test(SUPABASE_URL) && SUPABASE_ANON_KEY.length > 40 && typeof window.supabase !== 'undefined';
let sb = null, cloudUser = null, cloudTimer = null;

function setSync(state, label){
  const el = document.getElementById('syncBadge');
  if(!el) return;
  if(!cloudEnabled){ el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  el.className = 'sync-badge ' + state;
  el.innerHTML = `<i></i>${label}`;
}
function scheduleCloud(){
  if(!cloudUser) return;
  clearTimeout(cloudTimer);
  setSync('saving','salvando…');
  cloudTimer = setTimeout(pushCloud, 900);
}
async function pushCloud(){
  if(!sb || !cloudUser) return;
  try{
    const { error } = await sb.from('okr_state')
      .upsert({ user_id: cloudUser.id, state: S, updated_at: new Date().toISOString() });
    setSync(error ? 'err' : 'ok', error ? 'erro ao salvar' : 'sincronizado');
  }catch(e){ setSync('err','erro ao salvar'); }
}
async function loadCloud(){
  setSync('saving','carregando…');
  try{
    const { data, error } = await sb.from('okr_state')
      .select('state').eq('user_id', cloudUser.id).maybeSingle();
    if(error){ setSync('err','erro ao carregar'); return; }
    if(data && data.state && Array.isArray(data.state.telas)){
      S = data.state;
      if(!S.telas.find(t => t.id === S.activeTela)) S.activeTela = S.telas[0].id;
      save(); render();
      setSync('ok','sincronizado');
    } else {
      await pushCloud(); // primeira sessão: sobe o estado local
    }
  }catch(e){ setSync('err','erro ao carregar'); }
}
function openAuth(){
  modalRoot.innerHTML = `<div class="overlay">
    <div class="modal" style="max-width:420px" role="dialog" aria-modal="true">
      <div class="modal-head"><h3>Entrar</h3></div>
      <div class="modal-body">
        <div class="field"><label>E-mail</label><input id="a_email" type="email" autocomplete="username"></div>
        <div class="field"><label>Senha</label><input id="a_pass" type="password" autocomplete="current-password"></div>
        <div class="hint" id="a_msg">Use sua conta para acessar seus quadros de qualquer dispositivo.</div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="doSignup()">Criar conta</button>
        <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
      </div>
    </div></div>`;
  document.getElementById('a_pass').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
  setTimeout(() => document.getElementById('a_email').focus(), 40);
}
function authMsg(m, isErr){
  const el = document.getElementById('a_msg');
  if(el){ el.textContent = m; el.style.color = isErr ? 'var(--vermelho)' : ''; }
}
async function doLogin(){
  const email = document.getElementById('a_email').value.trim();
  const password = document.getElementById('a_pass').value;
  if(!email || !password) return authMsg('Preencha e-mail e senha.', true);
  authMsg('Entrando…');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) authMsg(error.message === 'Invalid login credentials' ? 'E-mail ou senha inválidos.' : error.message, true);
}
async function doSignup(){
  const email = document.getElementById('a_email').value.trim();
  const password = document.getElementById('a_pass').value;
  if(!email || password.length < 6) return authMsg('Informe e-mail válido e senha com 6+ caracteres.', true);
  authMsg('Criando conta…');
  const { data, error } = await sb.auth.signUp({ email, password });
  if(error) return authMsg(error.message, true);
  if(data.session) return; // já logado (confirmação de e-mail desativada)
  authMsg('Conta criada. Verifique seu e-mail para confirmar e depois clique em Entrar.');
}
async function initCloud(){
  if(!cloudEnabled){ setSync('off',''); return; }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.getElementById('logoutBtn').style.display = '';
  sb.auth.onAuthStateChange((ev, session) => {
    if(session && session.user){
      cloudUser = session.user;
      closeModal();
      loadCloud();
    } else {
      cloudUser = null;
      setSync('err','desconectado');
      openAuth();
    }
  });
  const { data:{ session } } = await sb.auth.getSession();
  if(session && session.user){ cloudUser = session.user; loadCloud(); }
  else openAuth();
}

render();
initCloud();
</script>
